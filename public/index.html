<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>生词标注助手 - 此在教育</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #6C3CE1;
  --primary-dark: #5528CC;
  --primary-light: #EDE5FF;
  --primary-ghost: #F8F5FF;
  --bg: #F2F0F7;
  --card: #FFFFFF;
  --text-primary: #1A1A2E;
  --text-secondary: #6B6B80;
  --text-muted: #A0A0B2;
  --border: #E8E6F0;
  --accent-amber: #E8A820;
  --accent-amber-bg: #FFF8E6;
  --shadow-sm: 0 1px 3px rgba(108,60,225,0.06);
  --shadow-md: 0 4px 16px rgba(108,60,225,0.08);
  --shadow-lg: 0 8px 32px rgba(108,60,225,0.12);
  --radius: 16px;
  --radius-sm: 10px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ===== Header ===== */
header {
  background: linear-gradient(135deg, #6C3CE1 0%, #8B5CF6 50%, #A78BFA 100%);
  padding: 16px 20px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: 0 2px 12px rgba(108,60,225,0.25);
}
header h1 {
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.5px;
}
header .brand {
  font-size: 11px;
  color: rgba(255,255,255,0.7);
  font-weight: 400;
  margin-top: 2px;
  letter-spacing: 1px;
}

main { flex: 1; display: flex; flex-direction: column; }

/* ===== Pages ===== */
.page { display: none; flex: 1; flex-direction: column; }
.page.active { display: flex; }

/* ===== Instructions Card ===== */
.instructions {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  margin: 16px 16px 12px;
  box-shadow: var(--shadow-md);
  border: 1px solid var(--border);
}
.instructions h2 {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 14px;
  color: var(--text-primary);
}
.step {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 10px;
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.5;
}
.step-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: linear-gradient(135deg, #6C3CE1, #8B5CF6);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
}
.step-note {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-top: 12px;
  padding: 10px 12px;
  background: var(--accent-amber-bg);
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: #92700C;
  line-height: 1.5;
  border: 1px solid #F0DFA0;
}
.step-note svg { flex-shrink: 0; margin-top: 1px; }

/* ===== Error ===== */
.error-msg {
  background: #FEF2F2;
  border: 1px solid #FECACA;
  border-radius: var(--radius-sm);
  padding: 14px;
  margin: 0 16px 12px;
  font-size: 14px;
  color: #DC2626;
}

/* ===== Upload Area ===== */
.upload-area {
  background: var(--card);
  border-radius: var(--radius);
  margin: 0 16px 16px;
  flex: 1;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-md);
  border: 1px solid var(--border);
  overflow: hidden;
}
.upload-zone {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 32px; cursor: pointer;
  border: 2px dashed #D4CCE8; border-radius: var(--radius);
  margin: 12px; transition: all 0.3s ease;
  background: var(--primary-ghost);
}
.upload-zone:hover, .upload-zone.dragover {
  border-color: var(--primary);
  background: var(--primary-light);
  transform: scale(1.01);
}
.upload-zone input { display: none; }
.camera-icon {
  width: 72px; height: 72px; border-radius: 50%;
  background: linear-gradient(135deg, #6C3CE1, #8B5CF6);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 18px;
  box-shadow: 0 4px 16px rgba(108,60,225,0.3);
}
.camera-icon svg { width: 34px; height: 34px; color: #fff; }
.upload-zone p {
  font-size: 16px; font-weight: 600;
  color: var(--text-primary); margin-bottom: 6px;
}
.upload-zone small { font-size: 13px; color: var(--text-muted); }

/* ===== Preview Thumbnails ===== */
.preview-area { flex: 1; display: flex; flex-direction: column; }
.preview-thumbs {
  flex: 1; padding: 12px; display: flex; flex-wrap: wrap;
  gap: 8px; background: var(--bg); border-radius: var(--radius) var(--radius) 0 0;
  overflow-y: auto; align-content: flex-start;
}
.thumb-item {
  width: calc(33.33% - 6px); aspect-ratio: 3/4;
  border-radius: var(--radius-sm); overflow: hidden;
  position: relative; background: var(--border);
  box-shadow: var(--shadow-sm);
  transition: transform 0.2s;
}
.thumb-item:hover { transform: scale(1.03); }
.thumb-item img { width: 100%; height: 100%; object-fit: cover; }
.thumb-item .thumb-remove {
  position: absolute; top: 6px; right: 6px;
  width: 24px; height: 24px; border-radius: 50%;
  background: rgba(0,0,0,0.55); color: #fff; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 15px; line-height: 1;
  backdrop-filter: blur(4px);
  transition: background 0.2s;
}
.thumb-item .thumb-remove:hover { background: rgba(220,38,38,0.8); }
.thumb-item .thumb-idx {
  position: absolute; bottom: 6px; left: 6px;
  background: linear-gradient(135deg, rgba(108,60,225,0.85), rgba(139,92,246,0.85));
  color: #fff; font-size: 11px; padding: 2px 8px;
  border-radius: 6px; font-weight: 600;
  backdrop-filter: blur(4px);
}
.preview-actions {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; background: var(--card);
  border-top: 1px solid var(--border);
}
.btn-add {
  padding: 8px 18px;
  background: var(--primary-ghost);
  color: var(--primary);
  border: 1.5px solid var(--primary-light);
  border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 600; cursor: pointer;
  transition: all 0.2s;
}
.btn-add:hover { background: var(--primary-light); border-color: var(--primary); }
.file-count { font-size: 13px; color: var(--text-muted); font-weight: 500; }

.submit-wrap { padding: 16px; }
.btn-primary {
  width: 100%; padding: 15px;
  background: linear-gradient(135deg, #6C3CE1, #8B5CF6);
  color: #fff;
  border: none; border-radius: var(--radius-sm);
  font-size: 16px; font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 16px rgba(108,60,225,0.3);
  letter-spacing: 0.3px;
}
.btn-primary:hover {
  background: linear-gradient(135deg, #5528CC, #7C3AED);
  box-shadow: 0 6px 24px rgba(108,60,225,0.4);
  transform: translateY(-1px);
}
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

/* ===== Processing ===== */
.processing {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 40px;
}
.spinner-wrap {
  position: relative;
  width: 64px; height: 64px;
  margin-bottom: 24px;
}
.spinner {
  width: 64px; height: 64px;
  border: 3px solid var(--primary-light);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.spinner-inner {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 24px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.processing p { font-size: 16px; color: var(--text-secondary); font-weight: 500; }
.processing .detail { font-size: 13px; color: var(--text-muted); margin-top: 8px; }

/* ===== Result Page ===== */
.result-header {
  padding: 14px 16px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.result-header span { font-size: 14px; color: var(--text-secondary); }
.result-header .count { font-weight: 700; color: var(--primary); font-size: 18px; }
.result-header button {
  font-size: 14px; color: var(--primary); font-weight: 600;
  background: none; border: none; cursor: pointer;
  padding: 6px 12px; border-radius: 8px;
  transition: background 0.2s;
}
.result-header button:hover { background: var(--primary-ghost); }

.word-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
.word-card {
  background: var(--card);
  border-radius: var(--radius-sm);
  padding: 16px;
  margin-bottom: 8px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
  transition: box-shadow 0.2s;
}
.word-card:hover { box-shadow: var(--shadow-md); }
.word-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.word-info { flex: 1; min-width: 0; }
.word-line { display: flex; align-items: baseline; gap: 8px; margin-bottom: 5px; flex-wrap: wrap; }
.word-idx { font-size: 12px; color: var(--text-muted); font-family: monospace; }
.word-text { font-size: 17px; font-weight: 700; color: var(--text-primary); }
.word-phonetic { font-size: 14px; color: var(--primary); font-family: monospace; font-weight: 500; }
.word-bottom { display: flex; align-items: baseline; gap: 8px; }
.word-pos {
  font-size: 11px; color: var(--accent-amber);
  background: var(--accent-amber-bg);
  padding: 2px 8px; border-radius: 6px; font-weight: 600;
  border: 1px solid #F0DFA0;
}
.word-meaning { font-size: 14px; color: var(--text-secondary); line-height: 1.4; }
.word-actions { display: flex; gap: 4px; flex-shrink: 0; }
.word-actions button {
  width: 34px; height: 34px; border-radius: 8px; border: none;
  background: none; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  color: var(--text-muted);
  transition: all 0.2s;
}
.word-actions button:hover { background: var(--primary-ghost); color: var(--primary); }
.word-actions button.del:hover { background: #FEF2F2; color: #EF4444; }

/* ===== Edit mode ===== */
.edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.edit-grid label { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 4px; font-weight: 500; }
.edit-grid input {
  width: 100%; padding: 8px 12px;
  border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 14px; outline: none;
  transition: all 0.2s;
}
.edit-grid input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(108,60,225,0.12); }
.btn-done {
  width: 100%; padding: 10px;
  background: linear-gradient(135deg, #6C3CE1, #8B5CF6);
  color: #fff;
  border: none; border-radius: 8px;
  font-size: 14px; font-weight: 600;
  cursor: pointer; margin-top: 8px;
}

/* ===== Export Bar ===== */
.export-bar {
  padding: 16px; background: var(--card);
  border-top: 1px solid var(--border);
}
.btn-export {
  width: 100%; padding: 14px;
  border: none; border-radius: var(--radius-sm);
  font-size: 15px; font-weight: 600;
  cursor: pointer; color: #fff;
  background: linear-gradient(135deg, #2563EB, #3B82F6);
  box-shadow: 0 4px 12px rgba(37,99,235,0.25);
  transition: all 0.3s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-export:hover {
  box-shadow: 0 6px 20px rgba(37,99,235,0.35);
  transform: translateY(-1px);
}
.btn-export:active { transform: translateY(0); }
.btn-export:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-export svg { width: 18px; height: 18px; }

/* ===== Footer ===== */
footer {
  padding: 12px 16px;
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
}
footer a { color: var(--primary); text-decoration: none; font-weight: 500; }

/* ===== Mode Selector ===== */
.mode-selector {
  display: flex; gap: 8px;
  margin: 0 16px 12px;
}
.mode-card {
  flex: 1; padding: 14px 12px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer; transition: all 0.2s;
  text-align: center;
  position: relative;
}
.mode-card.active {
  border-color: var(--primary);
  background: var(--primary-ghost);
  box-shadow: 0 0 0 3px rgba(108,60,225,0.1);
}
.mode-card .mode-icon { font-size: 24px; margin-bottom: 6px; }
.mode-card .mode-name { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.mode-card .mode-desc { font-size: 11px; color: var(--text-muted); margin-top: 4px; line-height: 1.4; }
.mode-card .mode-badge {
  position: absolute; top: -8px; right: -4px;
  background: linear-gradient(135deg, #10B981, #34D399);
  color: #fff; font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 8px;
  letter-spacing: 0.3px;
}
</style>
</head>
<body>

<header>
  <h1>生词标注助手</h1>
  <div class="brand">Dasein Education</div>
</header>

<main>
  <!-- Upload Page -->
  <div id="page-upload" class="page active">
    <div class="instructions">
      <h2>使用说明</h2>
      <div class="step"><span class="step-num">1</span><span>在试卷上用画圈或荧光笔标出不认识的生词</span></div>
      <div class="step"><span class="step-num">2</span><span>拍照或从相册选择图片上传（支持多张试卷）</span></div>
      <div class="step"><span class="step-num">3</span><span>选择标注方式，AI 自动识别并生成生词表</span></div>
      <div class="step"><span class="step-num">4</span><span>检查结果后导出 Word 文件保存</span></div>
      <div class="step-note">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="#E8A820"><path d="M10 2a8 8 0 100 16 8 8 0 000-16zM9 7a1 1 0 112 0v4a1 1 0 11-2 0V7zm1 8a1 1 0 100-2 1 1 0 000 2z"/></svg>
        <span>每张图片约需 20-40 秒识别，识别过程中请勿关闭页面。</span>
      </div>
    </div>
    <div class="mode-selector">
      <div class="mode-card active" data-mode="circle" onclick="setMode('circle')">
        <span class="mode-badge">推荐</span>
        <div class="mode-icon">O</div>
        <div class="mode-name">画圈标注</div>
        <div class="mode-desc">用笔圈出生词，识别率高，短语识别好</div>
      </div>
      <div class="mode-card" data-mode="highlight" onclick="setMode('highlight')">
        <div class="mode-icon">/</div>
        <div class="mode-name">荧光笔标注</div>
        <div class="mode-desc">用荧光笔涂抹生词，识别率约 70%</div>
      </div>
    </div>
    <div id="error-box" class="error-msg" style="display:none"></div>
    <div class="upload-area">
      <div id="upload-zone" class="upload-zone">
        <input type="file" id="file-input" accept="image/*" multiple>
        <div class="camera-icon">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Z"/>
          </svg>
        </div>
        <p>点击选择图片（可多选）</p>
        <small>支持 JPG、PNG 格式，可选择多张试卷</small>
      </div>
      <div id="preview-area" class="preview-area" style="display:none">
        <div class="preview-thumbs" id="preview-thumbs"></div>
        <div class="preview-actions">
          <button class="btn-add" id="add-more-btn">+ 继续添加</button>
          <span class="file-count" id="file-count">已选 0 张</span>
        </div>
        <div class="submit-wrap">
          <button class="btn-primary" id="submit-btn">开始识别</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Processing Page -->
  <div id="page-processing" class="page">
    <div class="processing">
      <div class="spinner-wrap">
        <div class="spinner"></div>
        <span class="spinner-inner">AI</span>
      </div>
      <p id="processing-text">正在识别图片中的生词...</p>
      <p class="detail" id="processing-detail"></p>
    </div>
  </div>

  <!-- Result Page -->
  <div id="page-result" class="page">
    <div class="result-header">
      <span>共识别 <span class="count" id="word-count">0</span> 个生词</span>
      <button id="reset-btn">重新上传</button>
    </div>
    <div class="word-list" id="word-list"></div>
    <div class="export-bar">
      <button class="btn-export" id="export-word">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        导出 Word 文件
      </button>
    </div>
  </div>
</main>

<footer>此在教育出品 &middot; Dasein Education</footer>

<script>
// ===== Configuration =====
const API_URL = '/api/recognize';
const MODEL = 'ernie-4.5-turbo-vl';

// ===== State =====
let selectedFiles = [];
let words = [];
let markMode = 'circle';  // 'circle' or 'highlight'

window.setMode = function(mode) {
  markMode = mode;
  document.querySelectorAll('.mode-card').forEach(c => {
    c.classList.toggle('active', c.dataset.mode === mode);
  });
};

// ===== DOM =====
const $ = id => document.getElementById(id);
const pages = { upload: $('page-upload'), processing: $('page-processing'), result: $('page-result') };

function showPage(name) {
  Object.values(pages).forEach(p => p.classList.remove('active'));
  pages[name].classList.add('active');
}

// ===== Image Compression =====
function compressImage(file, maxSize = 2048, quality = 0.85) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      if (width > maxSize || height > maxSize) {
        const ratio = Math.min(maxSize / width, maxSize / height);
        width = Math.round(width * ratio);
        height = Math.round(height * ratio);
      }
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      canvas.toBlob(blob => {
        if (!blob) return reject(new Error('图片压缩失败'));
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.readAsDataURL(blob);
      }, 'image/jpeg', quality);
    };
    img.onerror = () => reject(new Error('图片加载失败'));
    img.src = URL.createObjectURL(file);
  });
}

// ===== Image Cropping (split into regions) =====
function cropAndCompress(file, splitRatio = 0.5, maxSize = 1280, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const { width, height } = img;
      const splitY = Math.round(height * splitRatio);

      function compressCanvas(canvas) {
        let w = canvas.width, h = canvas.height;
        if (w > maxSize || h > maxSize) {
          const r = Math.min(maxSize / w, maxSize / h);
          const resized = document.createElement('canvas');
          resized.width = Math.round(w * r);
          resized.height = Math.round(h * r);
          resized.getContext('2d').drawImage(canvas, 0, 0, resized.width, resized.height);
          canvas = resized;
        }
        return new Promise((res, rej) => {
          canvas.toBlob(blob => {
            if (!blob) return rej(new Error('裁切压缩失败'));
            const reader = new FileReader();
            reader.onload = () => res(reader.result.split(',')[1]);
            reader.readAsDataURL(blob);
          }, 'image/jpeg', quality);
        });
      }

      const topCanvas = document.createElement('canvas');
      topCanvas.width = width;
      topCanvas.height = splitY;
      topCanvas.getContext('2d').drawImage(img, 0, 0, width, splitY, 0, 0, width, splitY);

      const botCanvas = document.createElement('canvas');
      botCanvas.width = width;
      botCanvas.height = height - splitY;
      botCanvas.getContext('2d').drawImage(img, 0, splitY, width, height - splitY, 0, 0, width, height - splitY);

      Promise.all([compressCanvas(topCanvas), compressCanvas(botCanvas)])
        .then(([top, bottom]) => resolve({ top, bottom }))
        .catch(reject);
    };
    img.onerror = () => reject(new Error('图片加载失败'));
    img.src = URL.createObjectURL(file);
  });
}

fileInput.addEventListener('change', () => {

function addFiles(files) {
  selectedFiles.push(...files);

}

function renderThumbnails() {
  const container = $('preview-thumbs');
  container.innerHTML = '';
  selectedFiles.forEach((file, i) => {
    const item = document.createElement('div');
    item.className = 'thumb-item';
    const img = document.createElement('img');
    img.src = URL.createObjectURL(file);
    const removeBtn = document.createElement('button');
    removeBtn.className = 'thumb-remove';
    removeBtn.innerHTML = '&times;';
    removeBtn.onclick = (e) => { e.stopPropagation(); removeFile(i); };
    const idx = document.createElement('span');
    idx.className = 'thumb-idx';
    idx.textContent = i + 1;
    item.appendChild(img);

    item.appendChild(idx);

function removeFile(index) {
  selectedFiles.splice(index, 1);

    previewArea.style.display = 'none';

// ===== API Helper =====
async function callAPI(messages, temp = 0.3) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 90000);

  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    signal: controller.signal,
    body: JSON.stringify({
      model: MODEL,
      messages,
      max_tokens: MODEL.startsWith('glm') ? 2048 : 3000,
      temperature: temp,
    }),
  });

  clearTimeout(timeout);

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.errorMsg || '识别服务异常（' + res.status + '）');
  }

  const data = await res.json();
  return data.choices?.[0]?.message?.content || '';
}

function parseWordsJSON(content) {
  // Try direct parse
  try { return JSON.parse(content); } catch {}

  // Try extracting from markdown code block
  const codeBlock = content.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (codeBlock) {
    try { return JSON.parse(codeBlock[1].trim()); } catch {}
  }

  // Try extracting the {"words": [...]} structure
  const jsonMatch = content.match(/\{\s*"words"\s*:\s*\[[\s\S]*\]\s*\}/);
  if (jsonMatch) {
    try { return JSON.parse(jsonMatch[0]); } catch {}
    // Fix common issues: trailing commas, truncated JSON
    let fixed = jsonMatch[0]
      .replace(/,\s*([}\]])/g, '$1')  // remove trailing commas
      .replace(/,\s*$/, '');           // remove trailing comma at end
    try { return JSON.parse(fixed); } catch {}
  }

  // Try to extract individual word objects if JSON is truncated
  const wordPattern = /\{\s*"word"\s*:\s*"([^"]+)"\s*,\s*"phonetic"\s*:\s*"([^"]*)"\s*,\s*"pos"\s*:\s*"([^"]*)"\s*,\s*"meaning"\s*:\s*"([^"]*)"\s*\}/g;
  const extracted = [];
  let match;
  while ((match = wordPattern.exec(content)) !== null) {
    extracted.push({ word: match[1], phonetic: match[2], pos: match[3], meaning: match[4] });
  }
  if (extracted.length > 0) return { words: extracted };

  throw new Error('识别结果解析失败，请重试');
}

function mergeWords(pass1, pass2) {
  const seen = new Set();
  const merged = [];
  function normalizeKey(word) {
    return word.toLowerCase().trim().replace(/\s+/g, ' ');
  }
  const allWords = [...pass1, ...pass2];
  for (const w of allWords) {
    const key = normalizeKey(w.word);
    if (!seen.has(key)) {
      seen.add(key);
      merged.push(w);
    }
  }
  return merged;
}

// ===== Process single image (region-split) =====
async function processOneImage(file, imgIdx, totalImgs, statusText, detailText) {
  const prefix = totalImgs > 1 ? `图片 ${imgIdx}/${totalImgs}` : '';
  const prompts = PROMPTS[markMode];
  const modeLabel = markMode === 'circle' ? '画圈' : '荧光笔';

  // Step 1: Crop image into article (top) and options (bottom)
  statusText.textContent = prefix ? `${prefix} - 裁切图片中...` : '正在裁切图片...';
  detailText.textContent = `${modeLabel}模式 - 将试卷分为正文区和选项区`;
  const { top, bottom } = await cropAndCompress(file, 0.5, 1280, 0.75);

  // Step 2: Recognize article region (top half)
  statusText.textContent = prefix ? `${prefix} - 识别正文区 (1/2)...` : '第 1/2 步：识别正文区...';
  detailText.textContent = `正在扫描文章正文中的${modeLabel}标注`;

  const topContent = await callAPI([{
    role: 'user',
    content: [
      { type: 'image_url', image_url: { url: `data:image/jpeg;base64,${top}` } },
      { type: 'text', text: prompts.article }
    ]
  }]);
  const topWords = (parseWordsJSON(topContent).words || []);

  // Step 3: Recognize options region (bottom half)
  statusText.textContent = prefix ? `${prefix} - 识别选项区 (2/2)...` : '第 2/2 步：识别选项区...';
  detailText.textContent = `正文区找到 ${topWords.length} 个词，正在扫描选项区`;

  const botContent = await callAPI([{
    role: 'user',
    content: [
      { type: 'image_url', image_url: { url: `data:image/jpeg;base64,${bottom}` } },
      { type: 'text', text: prompts.options }
    ]
  }]);
  const botWords = (parseWordsJSON(botContent).words || []);

  detailText.textContent = `正文区 ${topWords.length} 个 + 选项区 ${botWords.length} 个`;
  return mergeWords(topWords, botWords);
}

// ===== Submit =====
$('submit-btn').addEventListener('click', async () => {
  if (selectedFiles.length === 0) return;
  hideError();
  showPage('processing');

  const statusText = $('processing-text');
  const detailText = $('processing-detail');

  try {
    let allWords = [];
    const total = selectedFiles.length;

    for (let i = 0; i < total; i++) {
      const imgWords = await processOneImage(selectedFiles[i], i + 1, total, statusText, detailText);

      if (i === 0 && imgWords.length === 0 && total === 1) {
        throw new Error('未识别到高亮标注的单词，请确认图片中有用荧光笔标注的英文单词');
      }

      allWords = mergeWords(allWords, imgWords);
      detailText.textContent = `已累计识别 ${allWords.length} 个词`;
    }

    if (allWords.length === 0) {
      throw new Error('所有图片均未识别到高亮标注的单词');
    }

    words = allWords;
    renderWords();
    showPage('result');
  } catch (err) {
    showError(err.name === 'AbortError' ? '识别超时，请检查网络后重试' : (err.message || '识别失败'));
    showPage('upload');
  }
});

// ===== Result Page =====
function renderWords() {
  $('word-count').textContent = words.length;
  const list = $('word-list');
  list.innerHTML = '';
  words.forEach((w, i) => {
    const card = document.createElement('div');
    card.className = 'word-card';
    card.dataset.idx = i;
    card.innerHTML = renderWordView(w, i);
    list.appendChild(card);
  });
}

function renderWordView(w, i) {
  return `<div class="word-top"><div class="word-info">
    <div class="word-line">
      <span class="word-idx">${i + 1}.</span>
      <span class="word-text">${esc(w.word)}</span>
      <span class="word-phonetic">${esc(w.phonetic)}</span>
    </div>
    <div class="word-bottom">
      <span class="word-pos">${esc(w.pos)}</span>
      <span class="word-meaning">${esc(w.meaning)}</span>
    </div>
  </div>
  <div class="word-actions">
    <button onclick="editWord(${i})" title="编辑"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Z"/></svg></button>
    <button class="del" onclick="deleteWord(${i})" title="删除"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"/></svg></button>
  </div></div>`;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

window.editWord = function(i) {
  const card = document.querySelector(`.word-card[data-idx="${i}"]`);
  const w = words[i];
  card.innerHTML = `<div class="edit-grid">
    <div><label>单词</label><input id="e-word" value="${esc(w.word)}"></div>
    <div><label>音标</label><input id="e-phonetic" value="${esc(w.phonetic)}"></div>
    <div><label>词性</label><input id="e-pos" value="${esc(w.pos)}"></div>
    <div><label>释义</label><input id="e-meaning" value="${esc(w.meaning)}"></div>
  </div>
  <button class="btn-done" onclick="saveEdit(${i})">完成编辑</button>`;
};

window.saveEdit = function(i) {
  words[i] = {
    word: $('e-word').value,
    phonetic: $('e-phonetic').value,
    pos: $('e-pos').value,
    meaning: $('e-meaning').value,
  };
  renderWords();
};

window.deleteWord = function(i) {
  words.splice(i, 1);
  renderWords();
};

$('reset-btn').addEventListener('click', () => {
  words = [];
  selectedFiles = [];
  fileInput.value = '';
  previewArea.style.display = 'none';
  uploadZone.style.display = 'flex';
  hideError();
  showPage('upload');
});

// ===== Export Word (GET URL for WeChat compatibility) =====
$('export-word').addEventListener('click', () => {
  if (words.length === 0) return;
  const dateStr = new Date().toLocaleDateString('zh-CN');
  const json = JSON.stringify({ words, date: dateStr });
  // Encode to URL-safe base64
  const b64 = btoa(unescape(encodeURIComponent(json)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  // Open download URL - works even after WeChat redirects to system browser
  window.location.href = '/api/export?d=' + b64;
});
